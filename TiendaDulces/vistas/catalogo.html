<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo - Tienda de Dulces y Regalos</title>

    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/globales.css" />
    <link rel="stylesheet" href="../css/componentes.css" />
    <link rel="stylesheet" href="../css/paginas.css" />
  </head>
  <body>
    <header class="encabezado">
      <div class="contenedor-logo">
        <img src="../recursos/img/logo.png" alt="Logo Tienda" class="logo" />
      </div>
      <nav class="navegacion">
        <ul class="menu">
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="catalogo.html">Catálogo</a></li>

          <li id="item-login"><a href="login.html">Iniciar Sesión</a></li>

          <li id="item-logout" style="display: none">
            <a href="#" id="btn-cerrar-sesion">Cerrar Sesión</a>
          </li>

          <li>
            <a href="carrito.html" class="enlace-carrito">

        </ul>
      </nav>

    <main class="contenedor">
      <h1 class="titulo-seccion">Nuestro Catálogo</h1>

      <section class="barra-filtros">
        <button class="btn btn-filtro activo" data-categoria="Todos">
          Todos
        </button>
        <button class="btn btn-filtro" data-categoria="Desayunos">
          Desayunos
        </button>
        <button class="btn btn-filtro" data-categoria="Chocolates">
          Chocolates
        </button>
        <button class="btn btn-filtro" data-categoria="Dulces">Dulces</button>
        <button class="btn btn-filtro" data-categoria="Flores">Flores</button>
        <button class="btn btn-filtro" data-categoria="Peluches">
          Peluches
        </button>
      </section>

      <section id="contenedor-catalogo" class="cuadricula-productos"></section>
    </main>

    <footer class="pie-pagina">
      <p>
        &copy; 2026 Tienda de Dulces y Regalos. Todos los derechos reservados.
