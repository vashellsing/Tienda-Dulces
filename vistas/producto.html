<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle del Producto - Tienda de Regalos</title>

    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/globales.css" />
    <link rel="stylesheet" href="../css/componentes.css" />
    <link rel="stylesheet" href="../css/paginas.css" />
  </head>
  <body>
    <div id="contenedor-header"></div>

    <main class="contenedor">
      <div class="detalle-producto-container">
        <div class="detalle-col-izq">
          <img id="detalle-img" src="" alt="Cargando imagen..." />
        </div>

        <div class="detalle-col-der">
          <h1 id="detalle-nombre">Cargando producto...</h1>
          <p id="detalle-precio" class="producto-precio">$0.00</p>

          <div class="separador"></div>

          <h3>Descripción:</h3>
          <p id="detalle-descripcion" class="producto-descripcion">
            Cargando los detalles más deliciosos de este regalo...
          </p>

          <div class="acciones-compra">
            <button
              id="detalle-btn-agregar"
              class="btn btn-primario btn-grande"
            >
              Agregar al carrito
            </button>
            <br />
            <a href="catalogo.html" class="btn-volver">← Volver al catálogo</a>
          </div>

          <div class="beneficios-extra">
            <p>✨ Producto artesanal de alta calidad</p>
            <p>✅ Garantía de satisfacción</p>
          </div>
        </div>
      </div>
    </main>

    <div id="contenedor-footer"></div>

    <script src="../js/db.js"></script>
    <script src="../js/componentes.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/producto.js"></script>
  </body>
</html>
