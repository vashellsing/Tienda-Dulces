<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión - Tienda de Dulces y Regalos</title>

    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/globales.css" />
    <link rel="stylesheet" href="../css/componentes.css" />
    <link rel="stylesheet" href="../css/paginas.css" />
  </head>
  <body>
    <div id="contenedor-header"></div>

    <main class="contenedor contenedor-login">
      <div class="tarjeta-login">
        <h2 class="titulo-seccion">Iniciar Sesión</h2>
        <p class="subtitulo-login">Ingresa para poder realizar tus compras.</p>

        <form id="formulario-login">
          <div class="grupo-input">
            <label for="correo">Correo Electrónico</label>
            <input
              type="email"
              id="correo"
              placeholder="ejemplo@correo.com"
              required
            />
          </div>

          <div class="grupo-input">
            <label for="contrasena">Contraseña</label>
            <input
              type="password"
              id="contrasena"
              placeholder="******"
              required
            />
          </div>

          <p id="mensaje-error" class="mensaje-error"></p>

          <button type="submit" class="btn btn-primario btn-bloque">
            Ingresar
          </button>
        </form>

        <p style="text-align: center; margin-top: 20px">
          ¿No tienes cuenta?
          <a
            href="registro.html"
            style="color: var(--color-primario); font-weight: bold"
            >Regístrate aquí</a
          >
        </p>
      </div>
    </main>

    <div id="contenedor-footer"></div>

    <script src="../js/db.js"></script>
    <script src="../js/componentes.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/autenticacion.js"></script>
  </body>
</html>
