<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Tienda de Dulces y Regalos</title>
    
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/globales.css">
    <link rel="stylesheet" href="../css/componentes.css">
    <link rel="stylesheet" href="../css/paginas.css">
</head>
<body>

    <header class="encabezado">
        <div class="contenedor-logo">
            <img src="../recursos/img/logo.png" alt="Logo Tienda" class="logo">
        </div>
        <nav class="navegacion">
            <ul class="menu">
    <li><a href="../index.html">Inicio</a></li>
    <li><a href="catalogo.html">Catálogo</a></li>
    
    <li id="item-login"><a href="login.html">Iniciar Sesión</a></li>
    
    <li id="item-logout" style="display: none;"><a href="#" id="btn-cerrar-sesion">Cerrar Sesión</a></li>
    
    <li><a href="carrito.html" class="enlace-carrito">
        🛒 Carrito <span id="contador-carrito" class="insignia">0</span>
    </a></li>
</ul>
        </nav>
    </header>

    <main class="contenedor contenedor-login">
        <div class="tarjeta-login">
            <h2 class="titulo-seccion">Iniciar Sesión</h2>
            <p class="subtitulo-login">Ingresa para poder realizar tus compras.</p>
            
            <form id="formulario-login">
                <div class="grupo-input">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="grupo-input">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" placeholder="******" required>
                </div>

                <p id="mensaje-error" class="mensaje-error"></p>

                <button type="submit" class="btn btn-primario btn-bloque">Ingresar</button>
            </form>
        </div>
    </main>

    <footer class="pie-pagina">
        <p>&copy; 2026 Tienda de Dulces y Regalos.</p>
    </footer>

    <script type="module" src="../js/autenticacion.js"></script>
</body>
</html>
