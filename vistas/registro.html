<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Cuenta - Tienda de Dulces y Regalos</title>

    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/globales.css" />
    <link rel="stylesheet" href="../css/componentes.css" />
    <link rel="stylesheet" href="../css/paginas.css" />
  </head>
  <body>
    <div id="contenedor-header"></div>

    <main class="contenedor contenedor-login">
      <div class="tarjeta-login">
        <h2 class="titulo-seccion">Crear Cuenta</h2>
        <p class="subtitulo-login">
          Únete para comprar tus regalos más rápido.
        </p>

        <form id="formulario-registro">
          <div class="grupo-input">
            <label for="nombre-reg">Nombre Completo</label>
            <input
              type="text"
              id="nombre-reg"
              placeholder="Juan Pérez"
              required
            />
          </div>

          <div class="grupo-input">
            <label for="correo-reg">Correo Electrónico</label>
            <input
              type="email"
              id="correo-reg"
              placeholder="ejemplo@correo.com"
              required
            />
          </div>

          <div class="grupo-input">
            <label for="contrasena-reg">Contraseña</label>
            <input
              type="password"
              id="contrasena-reg"
              placeholder="Mínimo 6 caracteres"
              minlength="6"
              required
            />
          </div>

          <p id="mensaje-error-reg" class="mensaje-error"></p>

          <button type="submit" class="btn btn-primario btn-bloque">
            Registrarme
          </button>
        </form>

        <p style="text-align: center; margin-top: 20px">
          ¿Ya tienes cuenta?
          <a
            href="login.html"
            style="color: var(--color-primario); font-weight: bold"
            >Inicia sesión aquí</a
          >
        </p>
      </div>
    </main>

    <div id="contenedor-footer"></div>

    <script src="../js/db.js"></script>
    <script src="../js/componentes.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/registro.js"></script>
  </body>
</html>
