<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo - Tienda de Dulces y Regalos</title>

    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/globales.css" />
    <link rel="stylesheet" href="../css/componentes.css" />
    <link rel="stylesheet" href="../css/paginas.css" />
  </head>
  <body>
    <div id="contenedor-header"></div>

    <main class="contenedor">
      <h1 class="titulo-seccion">Nuestro Catálogo</h1>

      <section class="barra-filtros">
        <button class="btn btn-filtro activo" data-categoria="Todos">
          Todos
        </button>
        <button class="btn btn-filtro" data-categoria="Desayunos">
          Desayunos
        </button>
        <button class="btn btn-filtro" data-categoria="Chocolates">
          Chocolates
        </button>
        <button class="btn btn-filtro" data-categoria="Dulces">Dulces</button>
        <button class="btn btn-filtro" data-categoria="Flores">Flores</button>
        <button class="btn btn-filtro" data-categoria="Peluches">
          Peluches
        </button>
      </section>

      <section id="contenedor-catalogo" class="cuadricula-productos"></section>
    </main>

    <div id="contenedor-footer"></div>

    <script src="../js/db.js"></script>
    <script src="../js/componentes.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/catalogo.js"></script>
  </body>
</html>
